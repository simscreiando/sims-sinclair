<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Códice Sinclair 4.0 — Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --roxo-fundo: #0f0812;
            --roxo-card: #1d1121;
            --dourado: #d4af37;
            --dourado-claro: #f1d592;
            --texto: #e0d5e2;
            --transicao: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--roxo-fundo);
            color: var(--texto);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        /* NOTIFICAÇÕES TOAST */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .toast {
            background: var(--dourado);
            color: #000;
            padding: 12px 25px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.5s forwards;
        }

        /* MENU LATERAL PROFISSIONAL */
        nav {
            width: 260px;
            background: #09050a;
            border-right: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
        }

        nav h2 {
            color: var(--dourado);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-size: 1.5em;
        }

        nav button {
            background: transparent;
            color: var(--texto);
            border: none;
            padding: 18px 25px;
            text-align: left;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transicao);
            opacity: 0.7;
        }

        nav button:hover {
            background: rgba(212, 175, 55, 0.1);
            color: var(--dourado);
            opacity: 1;
            padding-left: 35px;
        }

        /* DASHBOARD */
        main { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .section { display: none; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.5s; }
        .section.active { display: block; }

        .camafeu {
            width: 140px;
            height: 180px;
            border: 2px solid var(--dourado);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            overflow: hidden;
            background: #000;
            cursor: pointer;
            transition: var(--transicao);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .camafeu:hover { transform: scale(1.05); border-color: var(--dourado-claro); }
        .camafeu img { width: 100%; height: 100%; object-fit: cover; }

        /* ROLETA ANIMADA */
        .card-roleta {
            background: var(--roxo-card);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: var(--transicao);
        }
        .card-roleta:hover { border-color: var(--dourado); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        
        .resultado {
            font-size: 1.2em;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            color: #fff;
            transition: var(--transicao);
        }
        .girando { filter: blur(5px); opacity: 0.5; transform: scale(0.9); }

        /* ÁRVORE VISUAL */
        .sim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .sim-card {
            background: #180e1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.1);
            display: flex;
            flex-direction: column;
        }
        .sim-header { height: 100px; background: linear-gradient(to right, #2d1b33, #0f0812); display: flex; align-items: center; padding: 0 20px; }
        .sim-img-mini { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--dourado); margin-right: 15px; background: #000; object-fit: cover; }
        .sim-info { padding: 15px; flex: 1; }

        /* BOTÕES */
        .btn-acao {
            background: var(--dourado);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8em;
            cursor: pointer;
            transition: var(--transicao);
        }
        .btn-acao:hover { background: var(--dourado-claro); letter-spacing: 1px; }

        /* ANIMAÇÕES */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--roxo-fundo); }
        ::-webkit-scrollbar-thumb { background: var(--roxo-card); border: 1px solid var(--dourado); border-radius: 4px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <nav>
        <h2>SINCLAIR</h2>
        <button onclick="showSection('dashboard')">🏰 Dashboard</button>
        <button onclick="showSection('arvore')">🌳 Árvore Genealógica</button>
        <button onclick="showSection('laboratorio')">🧪 Traços & Genética</button>
        <button onclick="showSection('regras')">📜 Livro de Leis</button>
        
        <div style="margin-top: auto; padding: 20px;">
            <button onclick="baixarBackup()" style="width:100%; border:1px solid var(--dourado); font-size: 0.7em;">📥 Exportar Dados</button>
            <input type="file" id="import-file" style="display:none" onchange="importarBackup(event)">
            <button onclick="document.getElementById('import-file').click()" style="width:100%; margin-top:10px; font-size: 0.7em;">📤 Importar Dados</button>
        </div>
    </nav>

    <main>
        <section id="dashboard" class="section active">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                <div class="camafeu" onclick="triggerUpload('marcy')">
                    <img id="img-marcy" src="">
                    <label style="position:absolute; bottom:0; width:100%; text-align:center; background:rgba(0,0,0,0.5); font-size:10px; padding:5px 0;">MARCY</label>
                </div>

                <div style="text-align:center">
                    <h4 style="margin:0; color:var(--dourado); letter-spacing:3px;">GERAÇÃO</h4>
                    <div style="font-size: 4em; font-weight: 700; line-height:1;" id="num-geracao">1</div>
                    <button class="btn-acao" onclick="changeGer(1)" style="margin-top:10px">+</button>
                    <button class="btn-acao" onclick="changeGer(-1)">-</button>
                </div>

                <div class="camafeu" onclick="triggerUpload('maya')">
                    <img id="img-maya" src="">
                    <label style="position:absolute; bottom:0; width:100%; text-align:center; background:rgba(0,0,0,0.5); font-size:10px; padding:5px 0;">MAYA</label>
                </div>
            </div>

            <button class="btn-acao" onclick="vorticeCaos()" style="width:100%; padding:20px; font-size:1.2em; background: linear-gradient(to right, #d4af37, #f1d592); margin-bottom: 40px;">🌪️ Ativar Vórtice de Caos</button>

            <div class="grid-roletas" id="container-roletas" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;"></div>
        </section>

        <section id="arvore" class="section">
            <h2 class="serif">Códice da Linhagem</h2>
            <div style="background:var(--roxo-card); padding:25px; border-radius:15px; margin-bottom:40px;">
                <h3 style="margin-top:0">Novo Registro de Sangue</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <input type="text" id="sim-nome" placeholder="Nome do Sim" style="padding:12px; background:#000; color:#fff; border:1px solid var(--dourado)">
                    <input type="file" id="sim-foto-input" accept="image/*" style="padding:10px; border:1px solid var(--dourado); background:#000; color:#fff;">
                    <input type="text" id="sim-pais" placeholder="Pais" style="padding:12px; background:#000; color:#fff; border:1px solid var(--dourado)">
                    <input type="text" id="sim-conjuges" placeholder="Cônjuges (separados por vírgula)" style="padding:12px; background:#000; color:#fff; border:1px solid var(--dourado)">
                </div>
                <button class="btn-acao" style="margin-top:20px; width:100%" onclick="salvarSim()">Eternizar no Códice</button>
            </div>
            <div class="sim-grid" id="lista-sims"></div>
        </section>

        <section id="laboratorio" class="section">
            <h2 class="serif">Gerador Genético</h2>
            <div style="background:var(--roxo-card); padding:30px; border-radius:15px; text-align:center">
                <select id="fase-vida" style="padding:15px; background:#000; color:#d4af37; border:1px solid var(--dourado); width:250px; font-size:1em;">
                    <option value="1">Bebê (1 Traço)</option>
                    <option value="2">Adolescente (2 Traços)</option>
                    <option value="3">Adulto (3 Traços + Aspiração)</option>
                </select>
                <button class="btn-acao" style="padding:15px 40px" onclick="gerarTracos()">Sortear Personalidade</button>
                <div id="resultado-tracos" style="margin-top:30px; font-size:1.5em; border: 1px dashed var(--dourado); padding:20px; min-height:50px;"></div>
            </div>
        </section>

        <section id="regras" class="section">
            <h2 class="serif">Livro de Leis</h2>
            <textarea id="texto-regras" style="width:100%; height:400px; background:#000; color:#fff; border:1px solid var(--dourado); padding:20px; font-family:serif; line-height:1.6;"></textarea>
            <button class="btn-acao" style="margin-top:20px" onclick="salvarRegras()">Selar Regras</button>
        </section>
    </main>

    <input type="file" id="upload-marcy" hidden accept="image/*" onchange="processImg('marcy', event)">
    <input type="file" id="upload-maya" hidden accept="image/*" onchange="processImg('maya', event)">

    <script>
        // BANCO DE DADOS INICIAL
        const defaultRoletas = [
            { id: 1, nome: "Destino Anual", itens: ["Prosperidade", "Escândalo", "Amor Inesperado", "Conflito", "Gravidez Surpresa", "Tragédia Silenciosa", "Evento Sobrenatural"] },
            { id: 2, nome: "Casamentos", itens: ["Amor Verdadeiro", "Contrato Político", "Romance Proibido", "Noivado Cancelado", "União Rival", "Triângulo Amoroso"] },
            { id: 3, nome: "Herdeiros", itens: ["Sem Filhos", "Herdeiro Único", "Gêmeos", "Filho Adotivo", "Herdeiro Rebelde", "Prodígio da Linhagem"] },
            { id: 4, nome: "Drama Nobre", itens: ["Caso Secreto Revelado", "Rivalidade entre Irmãos", "Escândalo Público", "Fortuna Perdida", "Segredo Antigo"] },
            { id: 5, nome: "Rotina Diária", itens: ["Estudo Arcano", "Governança da Mansão", "Exploração Mundial", "Visita à Matriarca", "Festa Aristocrática", "Dia de Caridade", "Ócio Criativo", "Noite no Reino da Magia"] },
            { id: 6, nome: "Marcy Imortal", itens: ["Novo Poder", "Visão do Futuro", "Intervenção Familiar", "Fase Introspectiva", "Tradição Permanente"] },
            { id: 7, nome: "Personalidade Adulta", itens: ["Líder Natural", "Espírito Livre", "Ambição Intensa", "Guardião do Legado", "Rebelde"] },
            { id: 8, nome: "Casa Sinclair", itens: ["Renovação Completa", "Novo Membro", "Crise Financeira", "Aparição Fantasmagórica", "Festa Histórica"] }
        ];

        const tracosBase = ["Alegre", "Familiar", "Astuta", "Cativante", "Exemplar", "Prudente", "Ambição", "Gênio", "Solitário", "Materialista", "Romântico", "Criativo", "Ativo", "Perfeccionista", "Sombrio", "Maldoso", "Esnobe", "Amante do Ar Livre"];

        let db = JSON.parse(localStorage.getItem('sinclair_v4_db')) || {
            geracao: 1,
            marcy_img: "",
            maya_img: "",
            sims: [],
            regras: "O Códice está pronto para suas leis..."
        };

        // INICIALIZAÇÃO
        function init() {
            document.getElementById('num-geracao').innerText = db.geracao;
            document.getElementById('img-marcy').src = db.marcy_img || 'https://via.placeholder.com/150';
            document.getElementById('img-maya').src = db.maya_img || 'https://via.placeholder.com/150';
            document.getElementById('texto-regras').value = db.regras;
            renderRoletas();
            renderSims();
        }

        function notify(msg) {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // LOGICA DE IMAGEM (BASE64)
        function triggerUpload(quem) { document.getElementById(`upload-${quem}`).click(); }
        
        function processImg(quem, event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const base64String = reader.result;
                db[`${quem}_img`] = base64String;
                document.getElementById(`img-${quem}`).src = base64String;
                saveDB();
                notify("Imagem atualizada com sucesso!");
            };
            reader.readAsDataURL(file);
        }

        // ROLETA COM ANIMAÇÃO
        function renderRoletas() {
            const container = document.getElementById('container-roletas');
            container.innerHTML = defaultRoletas.map(r => `
                <div class="card-roleta">
                    <h3>${r.nome}</h3>
                    <div id="res-${r.id}" class="resultado">Aguardando...</div>
                    <button class="btn-acao" onclick="girar(${r.id})" style="width:100%">Girar</button>
                </div>
            `).join('');
        }

        function girar(id) {
            const roleta = defaultRoletas.find(r => r.id === id);
            const display = document.getElementById(`res-${id}`);
            display.classList.add('girando');
            
            setTimeout(() => {
                const sorteado = roleta.itens[Math.floor(Math.random() * roleta.itens.length)];
                display.innerText = sorteado;
                display.classList.remove('girando');
                notify(`${roleta.nome}: ${sorteado}`);
            }, 800);
        }

        function vorticeCaos() {
            notify("🌪️ O Vórtice foi ativado!");
            defaultRoletas.slice(0, 4).forEach(r => girar(r.id));
        }

        // ÁRVORE GENEALÓGICA
        async function salvarSim() {
            const nome = document.getElementById('sim-nome').value;
            const fotoInput = document.getElementById('sim-foto-input').files[0];
            let fotoBase64 = "";

            if(fotoInput) {
                fotoBase64 = await toBase64(fotoInput);
            }

            const novoSim = {
                nome,
                foto: fotoBase64,
                pais: document.getElementById('sim-pais').value,
                conjuges: document.getElementById('sim-conjuges').value.split(','),
                id: Date.now()
            };

            db.sims.push(novoSim);
            saveDB();
            renderSims();
            notify(`${nome} foi registrado no Códice.`);
        }

        function renderSims() {
            const container = document.getElementById('lista-sims');
            container.innerHTML = db.sims.map(sim => `
                <div class="sim-card">
                    <div class="sim-header">
                        <img src="${sim.foto || 'https://via.placeholder.com/60'}" class="sim-img-mini">
                        <div class="serif" style="font-size:1.2em">${sim.nome}</div>
                    </div>
                    <div class="sim-info">
                        <div style="font-size:0.8em; opacity:0.7">Ascendência: ${sim.pais}</div>
                        <div style="margin-top:10px;">
                            ${sim.conjuges.map(c => `<div style="color:var(--dourado); font-size:0.9em">💍 ${c}</div>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // HELPERS
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        function saveDB() { 
            db.regras = document.getElementById('texto-regras').value;
            localStorage.setItem('sinclair_v4_db', JSON.stringify(db)); 
        }
        
        function changeGer(v) { db.geracao += v; if(db.geracao < 1) db.geracao = 1; document.getElementById('num-geracao').innerText = db.geracao; saveDB(); }
        
        function gerarTracos() {
            const qtd = document.getElementById('fase-vida').value;
            let sorteados = [];
            for(let i=0; i<qtd; i++) sorteados.push(tracosBase[Math.floor(Math.random()*tracosBase.length)]);
            document.getElementById('resultado-tracos').innerText = sorteados.join(' • ');
            notify("Traços gerados!");
        }

        function baixarBackup() {
            const data = JSON.stringify(db, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Codice_Sinclair_Backup.json`;
            a.click();
        }

        function importarBackup(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                db = JSON.parse(event.target.result);
                saveDB();
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        init();
    </script>
</body>
</html>
