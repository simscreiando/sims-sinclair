<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Companion Narrativo</title>

<style>
body {
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

h1 { color: #7ed957; }

.bar {
  height: 20px;
  border-radius: 10px;
  margin: 5px 0 15px;
}

#dramaBar { background: #ff6b6b; }
#caosBar { background: #f7b733; }
#estabilidadeBar { background: #4cd137; }

button {
  background: #7ed957;
  border: none;
  padding: 15px;
  font-size: 16px;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px;
}

.result, .history, .creator {
  background: #2c2c3f;
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
  text-align: left;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 8px;
  border: none;
  padding: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎲 Companion Narrativo</h1>

<div>
Drama: <span id="drama">0</span>
<div id="dramaBar" class="bar"></div>

Caos: <span id="caos">0</span>
<div id="caosBar" class="bar"></div>

Estabilidade: <span id="estabilidade">5</span>
<div id="estabilidadeBar" class="bar"></div>
</div>

<button onclick="girar()">Girar Roleta</button>
<button onclick="resetar()">Resetar</button>

<div class="result" id="resultado">Clique para começar</div>

<div class="history" id="historico">
<strong>Timeline:</strong><br>
</div>

<div class="creator">
<strong>🧠 Creator Log (seus 7 dias):</strong>
<textarea id="log" placeholder="Dia 1: ...&#10;Dia 2: ..."></textarea>
</div>

</div>

<script>
let drama = localStorage.getItem("drama") ? parseInt(localStorage.getItem("drama")) : 0;
let caos = localStorage.getItem("caos") ? parseInt(localStorage.getItem("caos")) : 0;
let estabilidade = localStorage.getItem("estabilidade") ? parseInt(localStorage.getItem("estabilidade")) : 5;

const eventos = [
{name:"Conversa Necessária",d:3,c:1,e:1,t:["relacionamento","emocional"]},
{name:"Autocuidado",d:1,c:0,e:3,t:["emocional","rotina"]},
{name:"Impulsiva",d:2,c:3,e:-1,t:["risco","caos"]},
{name:"Reconectar",d:2,c:0,e:2,t:["relacionamento"]},
{name:"Desejo Proibido",d:3,c:2,e:-2,t:["risco"]},
{name:"Mudança",d:2,c:2,e:-1,t:["caos"]},
{name:"Ajudar",d:1,c:0,e:2,t:["progresso"]},
{name:"Evento Social",d:2,c:3,e:1,t:["social"]},
{name:"Carreira",d:0,c:0,e:3,t:["progresso"]},
{name:"Passado",d:3,c:2,e:-1,t:["emocional"]},
{name:"Desastre",d:2,c:3,e:-2,t:["caos"]},
{name:"Sorte",d:1,c:2,e:3,t:["caos"]},
{name:"Teste",d:3,c:2,e:1,t:["relacionamento"]},
{name:"Novo",d:1,c:2,e:1,t:["progresso"]},
{name:"Silêncio",d:1,c:0,e:2,t:["preparação"]}
];

function girar() {

let pool = eventos;

// 🔥 consequência simples baseada no estado
if (caos > 8) {
  pool = eventos.filter(e => e.t.includes("caos"));
}

if (drama > 8) {
  pool = eventos.filter(e => e.t.includes("emocional") || e.t.includes("relacionamento"));
}

if (estabilidade > 8) {
  pool = eventos.filter(e => e.t.includes("rotina") || e.t.includes("progresso"));
}

const ev = pool[Math.floor(Math.random() * pool.length)];

drama += ev.d;
caos += ev.c;
estabilidade += ev.e;

atualizarUI();

document.getElementById("resultado").innerHTML =
`<strong>${ev.name}</strong><br>
Drama ${ev.d} | Caos ${ev.c} | Estabilidade ${ev.e}<br>
Tags: ${ev.t.join(", ")}`;

document.getElementById("historico").innerHTML += `• ${ev.name}<br>`;

salvar();
}

function atualizarUI() {
document.getElementById("drama").innerText = drama;
document.getElementById("caos").innerText = caos;
document.getElementById("estabilidade").innerText = estabilidade;

document.getElementById("dramaBar").style.width = (drama * 10) + "px";
document.getElementById("caosBar").style.width = (caos * 10) + "px";
document.getElementById("estabilidadeBar").style.width = (estabilidade * 10) + "px";
}

function salvar() {
localStorage.setItem("drama", drama);
localStorage.setItem("caos", caos);
localStorage.setItem("estabilidade", estabilidade);
localStorage.setItem("log", document.getElementById("log").value);
}

function resetar() {
localStorage.clear();
location.reload();
}

document.getElementById("log").value = localStorage.getItem("log") || "";

atualizarUI();
</script>

</body>
</html>
